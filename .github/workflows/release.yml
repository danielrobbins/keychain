name: release

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      title: ${{ steps.version.outputs.title }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Verify tag matches VERSION
        id: version
        run: |
          tag="${GITHUB_REF_NAME}"
          version="$(cat VERSION)"
          if [[ "${tag}" != "${version}" ]]; then
            echo "Tag ${tag} does not match VERSION ${version}" >&2
            exit 1
          fi
          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(_[A-Za-z0-9]+)?$ ]]; then
            echo "Unsupported VERSION format: ${version}" >&2
            exit 1
          fi
          prerelease=false
          if [[ "${version}" == *"_"* ]]; then
            prerelease=true
          fi
          title="${version//_/ }"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "title=${title}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Test
        run: python -m pytest tests -q

      - name: Build release artifacts
        run: |
          make clean
          make release-artifacts
          ./dist/keychain-${{ steps.version.outputs.version }}.pyz version 2>&1 | tee .version-smoke.txt
          grep -F "keychain ${{ steps.version.outputs.version }}" .version-smoke.txt
          ./dist/keychain-${{ steps.version.outputs.version }}.pyz man --list >/dev/null

      - name: Prepare release notes
        run: |
          version="${{ steps.version.outputs.version }}"
          awk -v ver="${version}" '
            $0 == "## " ver {f=1; next}
            /^## / && f {exit}
            f {print}
          ' ChangeLog.md > release-notes.md
          if [[ ! -s release-notes.md ]]; then
            echo "Failed to extract ChangeLog.md notes for ${version}" >&2
            exit 1
          fi

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: keychain-${{ steps.version.outputs.version }}
          path: |
            dist/keychain-${{ steps.version.outputs.version }}.pyz
            dist/SHA256SUMS
            release-notes.md

  publish:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download verified release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: keychain-${{ needs.build.outputs.version }}
          path: release

      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          cd release
          version="${{ needs.build.outputs.version }}"
          if gh release view "${version}" >/dev/null 2>&1; then
            gh release upload "${version}" \
              "dist/keychain-${version}.pyz" \
              dist/SHA256SUMS \
              --clobber
          else
            args=(
              --draft
              --title "Keychain ${{ needs.build.outputs.title }}"
              --notes-file release-notes.md
            )
            if [[ "${{ needs.build.outputs.prerelease }}" == "true" ]]; then
              args+=(--prerelease)
            fi
            gh release create "${version}" \
              "dist/keychain-${version}.pyz" \
              dist/SHA256SUMS \
              "${args[@]}"
          fi
